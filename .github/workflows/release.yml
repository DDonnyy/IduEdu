name: Release

# Automated releases driven by Conventional Commits (python-semantic-release).
# Runs only in the official IDUclub/IduEdu repository, after Tests and Coverage
# succeeds for a push to main. The release commit may include [skip ci], so docs
# deployment is chained from this workflow instead of from push events.

on:
  workflow_run:
    workflows: ["Tests and Coverage"]
    types: [completed]

# Do not run concurrent releases; let an in-flight release finish first.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    if: >
      github.repository == 'IDUclub/IduEdu' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version commit + tag and create the GitHub Release
      id-token: write # OIDC for PyPI Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # full history + tags are required to compute the next version

      - name: Ensure tested commit is still main
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.workflow_run.head_sha }}"

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.21.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI (Trusted Publishing)
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
