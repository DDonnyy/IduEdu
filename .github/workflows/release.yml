name: Release

# Automated releases driven by Conventional Commits (python-semantic-release).
# On every push to main the version is computed from commit messages since the
# last tag, iduedu/_version.py + CHANGELOG.md are bumped and committed, a vX.Y.Z
# tag and GitHub Release are created, and the package is published to PyPI via
# Trusted Publishing (OIDC). See CONTRIBUTING.md for the developer workflow.

on:
  push:
    branches: [main]

# Do not run concurrent releases; let an in-flight release finish first.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Fast, self-contained gate so we never publish code that does not build/pass.
  # Network (Overpass) tests are intentionally excluded here — they gate PRs in
  # ci_pipeline.yml, but must not make releases flaky.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: make install-dev

      - name: Check formatting
        run: make format-check

      - name: Run fast tests
        run: make test

  release:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version commit + tag and create the GitHub Release
      id-token: write # OIDC for PyPI Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags are required to compute the next version

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.21.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI (Trusted Publishing)
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
